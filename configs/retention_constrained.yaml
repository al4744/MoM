# Workstream D — Memory-pressure retention with default settings.
#
# Same as retention.yaml except gpu_memory_utilization=0.77 (forces tight
# KV budget on L4), max_model_len=4096, and tool_latency_ms=2000 (real
# 2-sec tool gap). Tests whether retention's pin-or-evict policy preserves
# blocks across tool gaps that would otherwise be evicted under memory
# pressure.

name: retention_constrained

model:
  name: meta-llama/Meta-Llama-3-8B
  dtype: float16
  max_model_len: 4096
  gpu_memory_utilization: 0.77

engine:
  retention:
    enabled: true
    ttl:
      alpha: 0.3
      default_ttl: 1.0
      safety_factor: 1.5
      use_per_tool_ema: true
      use_ema: true
    pin_manager:
      max_pinned_fraction: 0.30
  prefix_caching:
    enabled: true
  quantization:
    kv_cache: null
  torch_compile:
    enabled: false
  lmcache:
    enabled: false

traces:
  - id: 5turn-mixed
    turns: 5
    tool_latency_dist: mixed
    prompt_tokens: 1024
    tool_latency_ms: 2000
  - id: 10turn-mixed
    turns: 10
    tool_latency_dist: mixed
    prompt_tokens: 1024
    tool_latency_ms: 2000
  - id: 25turn-mixed
    turns: 25
    tool_latency_dist: mixed
    prompt_tokens: 1024
    tool_latency_ms: 2000
  - id: 50turn-mixed
    turns: 50
    tool_latency_dist: mixed
    prompt_tokens: 1024
    tool_latency_ms: 2000
