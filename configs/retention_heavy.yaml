# Workstream D — Heavy-context regime: retention with default tuning.
#
# The regime retention was designed for: per-agent KV demand exceeds the
# cache budget at concurrency ≥ 4, with varied tool latencies that exercise
# the TTL learning predictor. PC alone has to evict; retention's pin
# protects the most-recently-active conversation across each tool gap.
#
# Compared against prefix_cache_only_heavy.yaml — the
# (prefix_cache_only_heavy → retention_heavy) delta is the headline number
# attributable specifically to pin-or-evict.

name: retention_heavy

model:
  name: meta-llama/Meta-Llama-3-8B
  dtype: float16
  max_model_len: 8192
  gpu_memory_utilization: 0.85
  enforce_eager: true
  max_num_seqs: 8

engine:
  retention:
    enabled: true
    ttl:
      alpha: 0.3
      default_ttl: 1.0
      safety_factor: 1.5
      use_per_tool_ema: true
      use_ema: true
    pin_manager:
      max_pinned_fraction: 0.30
  prefix_caching:
    enabled: true
  quantization:
    kv_cache: null
  torch_compile:
    enabled: false
  lmcache:
    enabled: false

traces:
  - id: 20turn-large-fast
    turns: 20
    tool_latency_dist: fast
    prompt_tokens: 8192
    tool_latency_ms: 500
  - id: 20turn-large-medium
    turns: 20
    tool_latency_dist: medium
    prompt_tokens: 8192
    tool_latency_ms: 2000
  - id: 20turn-large-long
    turns: 20
    tool_latency_dist: long
    prompt_tokens: 8192
    tool_latency_ms: 5000
