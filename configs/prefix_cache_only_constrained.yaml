# Workstream D — Memory-pressure isolation: PC alone under tight KV budget.
#
# Same as prefix_cache_only.yaml except gpu_memory_utilization=0.77,
# max_model_len=4096, and tool_latency_ms=2000. Tests whether vLLM's
# built-in prefix cache survives memory pressure without retention. The
# (prefix_cache_only_constrained → retention_constrained) delta is the
# contribution of pin-or-evict specifically under pressure.

name: prefix_cache_only_constrained

model:
  name: meta-llama/Meta-Llama-3-8B
  dtype: float16
  max_model_len: 4096
  gpu_memory_utilization: 0.77

engine:
  retention:
    enabled: false
  prefix_caching:
    enabled: true                     # ← PC on, retention off
  quantization:
    kv_cache: null
  torch_compile:
    enabled: false
  lmcache:
    enabled: false

traces:
  - id: 5turn-mixed
    turns: 5
    tool_latency_dist: mixed
    prompt_tokens: 1024
    tool_latency_ms: 2000
  - id: 10turn-mixed
    turns: 10
    tool_latency_dist: mixed
    prompt_tokens: 1024
    tool_latency_ms: 2000
  - id: 25turn-mixed
    turns: 25
    tool_latency_dist: mixed
    prompt_tokens: 1024
    tool_latency_ms: 2000
  - id: 50turn-mixed
    turns: 50
    tool_latency_dist: mixed
    prompt_tokens: 1024
    tool_latency_ms: 2000
